<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Hail Mary - Blip-A Link</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Stars / Sun -->
    <div class="space-background"></div>
    <div class="tau-ceti-sun"></div>
    
    <!-- Slow Drifting Starships -->
    <div class="ship blip-a">
        <!-- Eridian Hexagonal Geometry -->
        <svg viewBox="0 0 100 100"><polygon points="50,5 95,27 95,72 50,95 5,72 5,27" fill="none" stroke="var(--gold)" stroke-width="2" opacity="0.6"/></svg>
    </div>
    <div class="ship hail-mary">
        <!-- Human Conical Rocket -->
        <svg viewBox="0 0 100 100"><path d="M50,10 L70,80 L50,90 L30,80 Z" fill="none" stroke="#add8e6" stroke-width="2" opacity="0.6"/></svg>
    </div>
    
    <!-- 3D Perspective Container for the Petrova Line and Messages -->
    <div id="perspective-container">
        <!-- SVG for the Petrova Line Arc made of Rocky text -->
        <svg class="petrova-line-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <!-- Invisible guide path -->
            <path id="petrovaPath" d="M500,1100 C600,800 700,500 500,100" fill="none" stroke="transparent"></path>
            
            <text class="petrova-text" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="12" fill="var(--gold)" filter="drop-shadow(0 0 10px rgba(255,140,0,0.8))">
               <textPath href="#petrovaPath" startOffset="-100%">
                    amaze! question? happy! amaze! amaze! question? happy! amaze! amaze! question? happy! amaze! amaze! question? happy! amaze! amaze! question? happy! amaze! amaze! question? happy! amaze! amaze! question? happy! amaze!
                    <animate attributeName="startOffset" from="-100%" to="100%" dur="30s" repeatCount="indefinite" />
               </textPath>
            </text>
            <text class="petrova-text" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="12" fill="var(--gold)" opacity="0.4" filter="drop-shadow(0 0 10px rgba(255,140,0,0.8))">
               <textPath href="#petrovaPath" startOffset="-50%">
                    leaky space blob! science! sleep! amaze! leaky space blob! science! sleep! amaze! leaky space blob! science! sleep! amaze! leaky space blob! science! sleep! amaze! leaky space blob! science! sleep! amaze!
                    <animate attributeName="startOffset" from="-100%" to="100%" dur="45s" repeatCount="indefinite" />
               </textPath>
            </text>
        </svg>

        <div id="chat-history">
            <!-- Messages will be injected here and translated in Z-space -->
        </div>
    </div>

    <!-- Foreground UI constraints -->
    <div class="ui-layer">
        <header>
            <div class="header-content">
                <h1>BLIP-A COMM LINK</h1>
                <button id="new-chat-btn" title="Start a fresh conversation">NEW CHAT</button>
            </div>
            <span class="status-badge" id="model-status-badge"><div class="pulse"></div> Hooking to VRAM...</span>
        </header>

        <div id="input-container">
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Transmit message to Rocky..." autocomplete="off" required />
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
